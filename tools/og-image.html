<!DOCTYPE html>
<!-- OGP画像の生成元（1200×630でスクリーンショットして assets/og.png に保存する） -->
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #070a12; --panel: #0f1422; --line: rgba(150,165,200,0.16);
    --text: #e8edf8; --muted: #8c96ad; --accent: #3fe0a4;
    --aws: #ff9a1f; --gcp: #5e9bff; --azure: #25c6f2;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden; position: relative;
    background: var(--bg); font-family: "JetBrains Mono", monospace;
    display: flex; align-items: center; justify-content: center;
  }
  /* 背景: グリッド＋緑のグロー */
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 48px 48px; opacity: .35;
    mask-image: radial-gradient(ellipse 90% 80% at 50% 45%, #000 30%, transparent 100%);
    -webkit-mask-image: radial-gradient(ellipse 90% 80% at 50% 45%, #000 30%, transparent 100%);
  }
  .glow {
    position: absolute; width: 900px; height: 500px; left: -200px; top: -220px;
    background: radial-gradient(closest-side, rgba(63,224,164,0.16), transparent);
  }
  .glow2 {
    position: absolute; width: 800px; height: 500px; right: -250px; bottom: -260px;
    background: radial-gradient(closest-side, rgba(94,155,255,0.12), transparent);
  }
  .term {
    position: relative; width: 1020px; border: 1px solid var(--line);
    border-radius: 14px; background: rgba(15,20,34,0.92);
    box-shadow: 0 30px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(63,224,164,0.06);
  }
  .bar {
    display: flex; align-items: center; gap: 9px; padding: 16px 22px;
    border-bottom: 1px solid var(--line);
  }
  .dot { width: 13px; height: 13px; border-radius: 50%; }
  .r { background: #ff5d6c; } .y { background: #ffd166; } .g { background: #3fe0a4; }
  .bar .title { margin-left: 12px; color: var(--muted); font-size: 17px; }
  .body { padding: 44px 56px 40px; }
  .cmd { color: var(--muted); font-size: 22px; margin-bottom: 22px; }
  .cmd .p { color: var(--accent); }
  .brand { font-size: 92px; font-weight: 800; letter-spacing: -2px; color: var(--text); line-height: 1.05; }
  .brand .p { color: var(--accent); }
  .brand .cur { color: var(--accent); }
  .tagline {
    font-family: "IBM Plex Sans JP", sans-serif; font-weight: 700;
    color: var(--text); font-size: 36px; margin-top: 22px; letter-spacing: 1px;
  }
  .sub {
    font-family: "IBM Plex Sans JP", sans-serif; color: var(--muted);
    font-size: 24px; margin-top: 12px;
  }
  .chips { display: flex; gap: 14px; margin-top: 30px; align-items: center; }
  .chip {
    font-size: 20px; font-weight: 600; padding: 9px 22px; border-radius: 999px;
    border: 1px solid var(--line); letter-spacing: 2px;
  }
  .chip.aws { color: var(--aws); border-color: rgba(255,154,31,0.45); background: rgba(255,154,31,0.08); }
  .chip.gcp { color: var(--gcp); border-color: rgba(94,155,255,0.45); background: rgba(94,155,255,0.08); }
  .chip.azure { color: var(--azure); border-color: rgba(37,198,242,0.45); background: rgba(37,198,242,0.08); }
  .chip.free { color: var(--accent); border-color: rgba(63,224,164,0.45); background: rgba(63,224,164,0.08); }
  .url {
    position: absolute; right: 36px; bottom: 24px; color: var(--accent);
    font-size: 21px; letter-spacing: 1px; opacity: .9;
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="term">
    <div class="bar">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="title">cloudcert — practice session</span>
    </div>
    <div class="body">
      <div class="cmd"><span class="p">$</span> cloudcert --start --mode=本試験レベル</div>
      <div class="brand"><span class="p">&gt;</span>CLOUDCERT<span class="cur">_</span></div>
      <div class="tagline">クラウド資格 演習ターミナル</div>
      <div class="sub">本試験レベルのシナリオ問題 × 全問詳細解説 — 登録不要・無料</div>
      <div class="chips">
        <span class="chip aws">AWS</span>
        <span class="chip gcp">GCP</span>
        <span class="chip azure">AZURE</span>
        <span class="chip free">¥0 / FREE</span>
      </div>
    </div>
  </div>
  <div class="url">cloudcert.app</div>
</body>
</html>
